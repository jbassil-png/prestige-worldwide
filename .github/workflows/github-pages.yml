name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare for static export
        run: |
          # Temporarily remove pages that require server-side rendering
          mv app/api /tmp/api.backup || true
          mv app/auth /tmp/auth.backup || true
          mv app/dashboard /tmp/dashboard.backup || true
          mv app/accounts /tmp/accounts.backup || true
          mv app/onboarding /tmp/onboarding.backup || true
          mv app/plan /tmp/plan.backup || true
          echo "✅ Moved dynamic pages for static export"

      - name: Build with Next.js for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://rmlxegsolfklkfzcmllp.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtbHhlZ3NvbGZrbGtmemNtbGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2ODE2MDQsImV4cCI6MjA4NDI1NzYwNH0.0fJBhxwAS4xlyCHTy_BbZB4D_SpBazwaITI4sTRrM1A' }}

      - name: Restore removed pages
        if: always()
        run: |
          mv /tmp/api.backup app/api || true
          mv /tmp/auth.backup app/auth || true
          mv /tmp/dashboard.backup app/dashboard || true
          mv /tmp/accounts.backup app/accounts || true
          mv /tmp/onboarding.backup app/onboarding || true
          mv /tmp/plan.backup app/plan || true
          echo "✅ Restored all pages"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
