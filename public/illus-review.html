<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illustration Review — Swiss Seclusion</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0F172A; font-family: system-ui, sans-serif; }
    #stage { position: fixed; inset: 0; }
    #stage svg { width: 100%; height: 100%; display: none; }
    #stage svg.active { display: block; }
    .toolbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(15,23,42,0.88); backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    }
    .nav-btn {
      padding: 8px 20px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: #CBD5E1;
      font-size: 14px; cursor: pointer; transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.14); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .illus-name { font-size: 16px; font-weight: 600; color: #F1F5F9; }
    .illus-counter { font-size: 12px; color: #64748B; margin-left: 6px; }
    .hint { margin-left: auto; font-size: 11px; color: #334155; }
  </style>
</head>

<div class="toolbar">
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Prev</button>
  <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
  <span class="illus-name" id="illus-name">Lake Geneva / Jet d'Eau</span>
  <span class="illus-counter" id="illus-counter">1 / 1</span>
  <span class="hint">← → arrow keys to navigate</span>
</div>

<script>
  const names = ['Lake Geneva / Jet d\'Eau'];
  const svgs = document.querySelectorAll('#stage svg');
  let current = 0;

  function show(index) {
    svgs.forEach((s, i) => s.classList.toggle('active', i === index));
    document.getElementById('illus-name').textContent = names[index];
    document.getElementById('illus-counter').textContent = `${index + 1} / ${svgs.length}`;
    document.getElementById('prev-btn').disabled = index === 0;
    document.getElementById('next-btn').disabled = index === svgs.length - 1;
    current = index;
  }

  function navigate(dir) {
    const next = current + dir;
    if (next >= 0 && next < svgs.length) show(next);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'ArrowLeft') navigate(-1);
  });
</script>
</body>
</html>
